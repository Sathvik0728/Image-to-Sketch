<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <meta http-equiv="Cache-Control"
          content="no-cache, no-store, must-revalidate">

    <meta http-equiv="Pragma"
          content="no-cache">

    <meta http-equiv="Expires"
          content="0">

    <title>Pencil Sketch Generator</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            font-family:'Segoe UI',sans-serif;

            background:linear-gradient(
                135deg,
                #0f172a,
                #1e293b
            );

            min-height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            padding:25px;
        }

        /* MAIN CONTAINER */

        .container{

            width:100%;

            max-width:1350px;

            background:rgba(30,41,59,0.96);

            border-radius:32px;

            padding:45px;

            display:flex;

            gap:45px;

            box-shadow:
            0 20px 50px rgba(0,0,0,0.55);

            border:1px solid rgba(255,255,255,0.06);
        }

        /* LEFT SIDE */

        .left{

    flex:1;

    display:flex;

    flex-direction:column;

    justify-content:center;

    padding-right:15px;

    padding-left:10px;
}
        /* TITLE */

        .left h1{

    color:white;

    font-size:54px;

    line-height:1.15;

    font-weight:800;

    margin-bottom:18px;

    letter-spacing:-1px;

    max-width:520px;

    margin-top:-20px;
}

        /* DESCRIPTION */

        .left p{

            color:#cbd5e1;

            font-size:20px;

            line-height:1.7;

            margin-bottom:40px;

            max-width:540px;
        }

        /* UPLOAD BOX */

        .upload-box{

            border:2px dashed rgba(255,255,255,0.15);

            border-radius:24px;

            padding:55px 35px;

            background:rgba(255,255,255,0.03);

            transition:0.3s;

            margin-bottom:35px;

            display:flex;

            justify-content:center;

            align-items:center;
        }

        .upload-box:hover{

            border-color:#22d3ee;

            background:rgba(255,255,255,0.05);
        }

        input[type="file"]{

            color:white;

            font-size:17px;
        }

        /* BUTTON WRAPPER */

        .button-wrapper{

            width:100%;

            display:flex;

            justify-content:center;
        }

        /* GENERATE BUTTON */

        .btn{

            width:290px;

            padding:18px;

            border:none;

            border-radius:18px;

            background:linear-gradient(
                135deg,
                #06b6d4,
                #2563eb
            );

            color:white;

            font-size:20px;

            font-weight:700;

            cursor:pointer;

            transition:0.3s;

            box-shadow:
            0 10px 25px rgba(37,99,235,0.35);
        }

        .btn:hover{

            transform:translateY(-4px);

            box-shadow:
            0 15px 35px rgba(37,99,235,0.45);
        }

        /* RIGHT SIDE */

        .right{

            flex:1;

            display:flex;

            flex-direction:column;

            justify-content:center;

            align-items:center;
        }

        /* RESULT BOX */

        .preview-card{

            width:100%;

            height:540px;

            background:linear-gradient(
                145deg,
                #111827,
                #1f2937
            );

            border-radius:30px;

            overflow:hidden;

            border:1px solid rgba(255,255,255,0.08);

            display:flex;

            justify-content:center;

            align-items:center;

            padding:22px;

            box-shadow:
            inset 0 0 25px rgba(255,255,255,0.03),
            0 15px 35px rgba(0,0,0,0.45);
        }

        /* RESULT IMAGE */

        .preview-card img{

            width:100%;

            height:100%;

            object-fit:contain;

            border-radius:18px;

            display:block;
        }

        /* PLACEHOLDER */

        .placeholder{

            color:#94a3b8;

            font-size:24px;

            font-weight:600;

            text-align:center;

            opacity:0.8;
        }

        /* DOWNLOAD BUTTON */

        .download-btn{

            margin-top:28px;

            text-decoration:none;

            background:linear-gradient(
                135deg,
                #10b981,
                #059669
            );

            color:white;

            padding:16px 38px;

            border-radius:18px;

            font-size:19px;

            font-weight:700;

            transition:0.3s;

            box-shadow:
            0 10px 25px rgba(16,185,129,0.3);
        }

        .download-btn:hover{

            transform:translateY(-4px);

            box-shadow:
            0 15px 35px rgba(16,185,129,0.45);
        }

        /* MOBILE */

        @media(max-width:950px){

            .container{

                flex-direction:column;

                padding:28px;
            }

            .left{

                align-items:center;

                text-align:center;
            }

            .left h1{

                font-size:44px;
            }

            .left p{

                max-width:100%;
            }

            .btn{

                width:100%;
            }

            .preview-card{

                height:360px;
            }
        }

    </style>

</head>

<body>

    <div class="container">

        <!-- LEFT SIDE -->

        <div class="left">

            <h1>
                Pencil Sketch Generator
            </h1>

            <p>
                Upload your image and instantly convert it
                into a realistic pencil sketch.
            </p>

            <form method="POST"
                  enctype="multipart/form-data">

                <div class="upload-box">

                    <input type="file"
                           name="photo"
                           required>

                </div>

                <div class="button-wrapper">

                    <button type="submit"
                            class="btn">

                        Generate Sketch

                    </button>

                </div>

            </form>

        </div>

        <!-- RIGHT SIDE -->

        <div class="right">

            <div class="preview-card">

                {% if sketch_image %}

                    <img src="{{ sketch_image }}"
                         alt="Sketch">

                {% else %}

                    <div class="placeholder">

                        Sketch Preview

                    </div>

                {% endif %}

            </div>

            {% if sketch_image %}

            <a href="{{ sketch_image }}"
               download="pencil_sketch.jpg"
               class="download-btn">

               ⬇ Download Sketch

            </a>

            {% endif %}

        </div>

    </div>

</body>

</html>
